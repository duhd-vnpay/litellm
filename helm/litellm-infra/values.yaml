# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Infrastructure — Default Values
# ═══════════════════════════════════════════════════════════════════════════════

global:
  namespace: litellm

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  image: postgres:16-alpine
  database: litellm
  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"

# ─── Redis ────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7-alpine
  maxMemory: 128mb
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 192Mi
      cpu: 250m
