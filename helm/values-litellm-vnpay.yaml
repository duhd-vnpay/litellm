# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Upstream Chart — VNPayCloud Values Override
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:
#   helm install litellm <litellm-helm-chart-path> \
#     -f values-vnpay.yaml -n litellm

replicaCount: 2
# numWorkers: 2

image:
  # SECURITY: Pin to exact digest, NOT mutable tags like main-stable/main-latest
  # Supply chain incident 2026-03-24: v1.82.7/v1.82.8 compromised by TeamPCP (credential stealer)
  # Current image runs v1.82.3 (verified clean). Update ONLY after manual review.
  # Digest: sha256:7c51011535fc9347fc306c8ed7d2e4cdda2336ffd91d930a35fdccd034f2ec17
  # Ref: https://docs.litellm.ai/blog/security-update-march-2026
  repository: ghcr.io/berriai/litellm-database
  pullPolicy: IfNotPresent
  tag: "main-stable"
  # To upgrade: verify new version is clean, update tag, run `helm upgrade`, then update digest comment

# ─── Database (use litellm-infra's PostgreSQL) ────────────────────────────────
db:
  useExisting: true
  deployStandalone: false
  endpoint: litellm-postgresql
  database: litellm
  url: "postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)"
  secret:
    name: litellm-postgres-credentials
    usernameKey: username
    passwordKey: password

# ─── Redis (use litellm-infra's Redis, not built-in subchart) ─────────────────
redis:
  enabled: false

# ─── Secrets ──────────────────────────────────────────────────────────────────
masterkeySecretName: litellm-master-key
masterkeySecretKey: PROXY_MASTER_KEY

environmentSecrets:
  - litellm-provider-keys
  - litellm-master-key

# ─── Proxy Config ─────────────────────────────────────────────────────────────
proxy_config:
  model_list:
    # ── VNPAY GenAI Gateway (on-premise GLM-4) ──
    - model_name: v_glm46
      litellm_params:
        model: openai/v_glm46
        api_base: https://genai.vnpay.vn/aigateway/llm_glm46/v1
        api_key: os.environ/VNPAY_GENAI_API_KEY
        model_info:
          id: v_glm46

    # Additional providers can be added via UI (store_model_in_db: true)

  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY
    store_model_in_db: true
    enable_content_filtering: false

  litellm_settings:
    request_timeout: 300
    cache: true
    cache_params:
      type: redis
      host: litellm-redis
      port: 6379
      password: os.environ/REDIS_PASSWORD

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: litellm.x.vnshop.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tls-vnshop-cloud
      hosts:
        - litellm.x.vnshop.cloud

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 4000

# ─── Migration Job ────────────────────────────────────────────────────────────
migrationJob:
  enabled: true
  hooks:
    argocd:
      enabled: false
    helm:
      enabled: true

# ─── High Availability ────────────────────────────────────────────────────────
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

pdb:
  enabled: true
  minAvailable: 1

# ─── Pod Scheduling ───────────────────────────────────────────────────────────
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: litellm
