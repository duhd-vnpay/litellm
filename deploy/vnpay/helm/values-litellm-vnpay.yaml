# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Upstream Chart — VNPayCloud Values Override
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:
#   helm install litellm <litellm-helm-chart-path> \
#     -f values-litellm-vnpay.yaml -n litellm

replicaCount: 2
# numWorkers: 2

image:
  # SECURITY: Pin to exact digest, NOT mutable tags like main-stable/main-latest
  # Supply chain incident 2026-03-24: v1.82.7/v1.82.8 compromised by TeamPCP (credential stealer)
  # Ref: https://docs.litellm.ai/blog/security-update-march-2026
  #
  # 2026-04-10: Upgrade v1.82.3 → v1.83.3.rc.1 to fix 3 CVEs:
  #   - GHSA-jjhc-v7c2-5hh6 (CRITICAL 9.8) OIDC cache key collision → auth bypass
  #   - GHSA-69x8-hrgq-fjj8 (HIGH 8.8) SHA-256 password hash exposure + pass-the-hash
  #   - GHSA-53mr-6c8q-9789 (HIGH 8.4) Privilege escalation via /config/update
  # Ref: https://docs.litellm.ai/blog/security-hardening-april-2026
  #
  # 2026-04-14: Upgrade v1.83.3.rc.1 → v1.83.3-stable (stable release of same version)
  # Digest verified 2026-04-18 via kubectl get pod -o jsonpath='{.status.containerStatuses[0].imageID}'
  # Digest (amd64): sha256:1eb87774fb733a8c05301b9b52d9164ed4d96c499745a1a5258fba53c9a0d922
  repository: litellm/litellm-database
  pullPolicy: IfNotPresent
  tag: "v1.83.3-stable@sha256:1eb87774fb733a8c05301b9b52d9164ed4d96c499745a1a5258fba53c9a0d922"

# ─── Database (via PgBouncer → PostgreSQL) ────────────────────────────────────
# PgBouncer: transaction pooling, connection reuse, dead connection detection
# Prisma params: connection_limit=10 per pod, pool_timeout=30s, connect_timeout=10s
db:
  useExisting: true
  deployStandalone: false
  endpoint: litellm-pgbouncer
  database: litellm
  # `pgbouncer=true` → Prisma dùng simple protocol (no server-side prepared
  # statements), an toàn khi PgBouncer transaction/session mode.
  url: "postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)?connection_limit=10&pool_timeout=30&connect_timeout=10&pgbouncer=true"
  secret:
    name: litellm-postgres-credentials
    usernameKey: username
    passwordKey: password

# ─── Redis (use litellm-infra's Redis, not built-in subchart) ─────────────────
redis:
  enabled: false

# ─── Secrets ──────────────────────────────────────────────────────────────────
masterkeySecretName: litellm-master-key
masterkeySecretKey: PROXY_MASTER_KEY

environmentSecrets:
  - litellm-provider-keys
  - litellm-master-key
  - litellm-splunk-hec # SPLUNK_HEC_URL, SPLUNK_HEC_TOKEN (+ tuỳ chọn SPLUNK_HEC_INDEX, SPLUNK_HEC_VERIFY_TLS)

# ─── Proxy Config ─────────────────────────────────────────────────────────────
proxy_config:
  model_list:
    # ── Tier 0: VNPAY GenAI on-premise — sensitive data, zero egress ──────────
    - model_name: vnpay-sensitive
      litellm_params:
        model: openai/v_minimax
        api_base: https://genai.vnpay.vn/aigateway/llm_minimax/v1
        api_key: os.environ/VNPAY_GENAI_API_KEY
        num_retries: 2
        drop_params: true # Drop unsupported params (e.g. context_management từ Claude clients)
      model_info:
        id: vnpay-sensitive
        input_cost_per_token: 0 # On-premise, no API cost
        output_cost_per_token: 0
        description: "On-premise MiniMax-M2.7 — dữ liệu nhạy cảm, zero data egress"

    # Legacy alias — giữ để backward compat với client đang dùng v_glm46
    - model_name: v_glm46
      litellm_params:
        model: openai/v_glm46
        api_base: https://genai.vnpay.vn/aigateway/llm_glm46/v1
        api_key: os.environ/VNPAY_GENAI_API_KEY
        num_retries: 2
        drop_params: true # Drop unsupported params (e.g. context_management từ Claude clients)
      model_info:
        id: v_glm46
        input_cost_per_token: 0 # On-premise, no API cost
        output_cost_per_token: 0

    # ── MiniMax M2.7 230B on-premise — OpenAI-compatible, thinking support ──────
    - model_name: vnpay/minimax
      litellm_params:
        model: openai/v_minimax
        api_base: https://genai.vnpay.vn/aigateway/llm_minimax/v1
        api_key: os.environ/VNPAY_GENAI_API_KEY
        num_retries: 2
        drop_params: true # Drop unsupported params (e.g. context_management)
      model_info:
        id: vnpay-minimax
        input_cost_per_token: 0 # On-premise, no API cost
        output_cost_per_token: 0
        max_input_tokens: 131072
        max_output_tokens: 16384
        description: "MiniMax M2.7 230B on-premise — zero egress, thinking support"

    # ── Embedding: BGE-M3 on-premise — multilingual dense/sparse retrieval ──────
    - model_name: text-embedding-3-small
      litellm_params:
        model: openai/v_search
        api_base: https://genai.vnpay.vn/aigateway/embed/v1
        api_key: os.environ/VNPAY_GENAI_API_KEY
        num_retries: 2
      model_info:
        id: vnpay-embedding-bge-m3
        mode: embedding
        input_cost_per_token: 0 # On-premise, no API cost
        output_cost_per_token: 0
        max_input_tokens: 8192
        description: "BGE-M3 on-premise — 1024 dims, multilingual embedding, zero egress"

    # ── Tier 1: MiniMax M2.7 on-premise — simple tasks ─────────────────────────
    - model_name: vnpay-simple
      litellm_params:
        model: openai/v_minimax
        api_base: https://genai.vnpay.vn/aigateway/llm_minimax/v1
        api_key: os.environ/VNPAY_GENAI_API_KEY
        num_retries: 2
        drop_params: true # Drop unsupported params (e.g. context_management)
      model_info:
        id: vnpay-simple
        input_cost_per_token: 0 # On-premise, no API cost
        output_cost_per_token: 0
        max_input_tokens: 131072
        max_output_tokens: 16384
        description: "MiniMax M2.7 on-premise — tác vụ đơn giản, zero egress"

    # ── Tier 2: Kimi K2.5 — coding, analysis (cloud API) ────────────────────
    - model_name: vnpay-medium
      litellm_params:
        model: moonshot/kimi-k2.5
        api_base: https://api.moonshot.ai/v1
        api_key: os.environ/KIMI_API_KEY
        num_retries: 2
        drop_params: true # Drop unsupported params (e.g. context_management từ Claude clients)
      model_info:
        id: vnpay-medium
        input_cost_per_token: 0.0000006 # $0.60/MTok
        output_cost_per_token: 0.000003 # $3.00/MTok — ref: platform.kimi.ai/docs/pricing/chat-k25
        max_input_tokens: 262144
        max_output_tokens: 16384 # Kimi K2.5 — giảm từ 64K để tiết kiệm resource
        description: "Kimi K2.5 — coding, debug, analysis, 262K context"

    # ── Tier 3: Claude Sonnet 4.6 — complex reasoning ─────────────────────────
    - model_name: claude-sonnet
      litellm_params:
        model: anthropic/claude-sonnet-4-6
        api_key: os.environ/ANTHROPIC_API_KEY
        num_retries: 2
      model_info:
        id: claude-sonnet
        description: "Claude Sonnet 4.6 — kiến trúc, bảo mật, reasoning phức tạp"

    # ── Tier 3+: Claude Opus 4.6 — deep reasoning, long context ──────────────
    - model_name: claude-opus
      litellm_params:
        model: anthropic/claude-opus-4-6
        api_key: os.environ/ANTHROPIC_API_KEY
        num_retries: 2
      model_info:
        id: claude-opus
        description: "Claude Opus 4.6 — phân tích chiến lược, tác vụ phức tạp nhất"

    # Additional providers added via UI (store_model_in_db: true).
    # NOTE: num_retries for DB-stored models is applied by post-upgrade Job
    # See: helm/litellm-post-upgrade-job.yaml

  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY
    store_model_in_db: true
    # Google SSO via oauth2-proxy — đăng ký /vnpay-sso route tự động khi import
    custom_sso: vnpay_sso_handler.vnpay_google_sso
    enable_content_filtering: false
    # Trust X-Forwarded-For header từ nginx ingress → ghi đúng client IP vào spend log
    use_x_forwarded_for: true
    # ── SpendLogs retention — auto-cleanup logs cũ hơn 7 ngày ─────────────
    # Xóa batch 1000 rows/lần lúc 3:00 AM UTC
    maximum_spend_logs_retention_period: "7d"
    maximum_spend_logs_cleanup_cron: "0 3 * * *"

  router_settings:
    num_retries: 2 # Router-level global — correct scope for v1.83.3.rc.1 bug fix
    # Fallback chain: nếu provider fail → thử provider tiếp theo
    fallbacks:
      - claude-opus:
          - claude-sonnet
      - claude-sonnet:
          - vnpay-medium
      - vnpay-medium:
          - vnpay-simple # Kimi medium fail → Kimi simple
    # Context window overflow → escalate lên tier cao hơn
    context_window_fallbacks:
      - vnpay-simple:
          - claude-sonnet # Kimi 128K overflow → Claude Sonnet
      - vnpay-medium:
          - claude-sonnet # Kimi 128K overflow → Claude Sonnet
    allowed_fails: 2 # cho phép fail 2 lần trước khi cooldown
    cooldown_time: 60 # giây cooldown khi provider bị đánh dấu fail

  litellm_settings:
    num_retries: 2 # Library-level fallback (may not reach router in v1.83.3.rc.1)
    modify_params: true # Auto-fix Anthropic tool_choice without tools= (Xcode/Copilot compat)
    use_chat_completions_url_for_anthropic_messages: true # Force chat/completions path — tắt Responses API routing cho openai provider (vnpay/minimax on-premise)
    request_timeout: 600
    cache: true
    cache_params:
      type: redis
      host: litellm-redis
      port: 6379
      password: os.environ/REDIS_PASSWORD
    # ── Audit log (OSS license-gated, unlock qua vnpay_premium_unlock) ────────
    # LiteLLM_AuditLog table ghi thay đổi team/key/user/model. `store_audit_logs`
    # bật dispatcher; `vnpay_premium_unlock` callback set premium_user=True để
    # bypass gate ở audit_logs.py:175.
    store_audit_logs: true
    # audit_log_callbacks nhận StandardAuditLogPayload → forward tới hệ ngoài.
    # vnpay_splunk_audit đọc SPLUNK_HEC_URL/TOKEN từ secret litellm-splunk-hec,
    # self-disable nếu secret chưa tạo (log WARNING, không break proxy).
    # LƯU Ý: audit_log_callbacks handler (proxy_server.py:3160) KHÔNG truyền
    # config_file_path cho get_instance_fn → phải dùng dotted Python module
    # name (không phải absolute path). PYTHONPATH=/etc/litellm/hooks nên
    # `vnpay_splunk_audit` import được qua importlib.import_module.
    audit_log_callbacks:
      - vnpay_splunk_audit.vnpay_splunk_audit
    # ── Pre-call routing hook ─────────────────────────────────────────────────
    # Custom model pricing (MiniMax-M2.7, openai/v_minimax, openai/v_glm46) được
    # inject vào litellm.model_cost qua vnpay_routing_hook.py (lazy init)
    # Mount: /etc/litellm/hooks/vnpay_routing_hook.py (xem volumes bên dưới)
    callbacks:
      - /etc/litellm/hooks/vnpay_premium_unlock.vnpay_premium_unlock # Unlock OSS license gates (audit log, v.v.)
      - /etc/litellm/hooks/vnpay_routing_hook.vnpay_routing_hook
      - otel # OpenTelemetry → Jaeger sdlc-go-prod:4317

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/compute-full-forwarded-for: "true"
    nginx.ingress.kubernetes.io/forwarded-for-header: "X-Forwarded-For"
    # ── Google SSO via oauth2-proxy ───────────────────────────────────────────
    nginx.ingress.kubernetes.io/auth-url: "http://litellm-oauth2-proxy.litellm.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://litellm.x.vnshop.cloud/oauth2/start?rd=/vnpay-sso"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-Email,X-Auth-Request-User"
    # Skip OAuth cho:
    #   - API calls (Bearer token) — LiteLLM tự xác thực bằng API key
    #   - Teleport App Access — JWT assertion header, Teleport đã authenticate user
    nginx.ingress.kubernetes.io/auth-snippet: |
      if ($http_authorization ~* "^Bearer ") {
        return 200;
      }
      if ($http_teleport_jwt_assertion) {
        return 200;
      }
    # ── SSO handoff routing ───────────────────────────────────────────────────
    # `auth-signin?rd=/vnpay-sso` chỉ trigger khi oauth2-proxy auth FAIL (first login).
    # User đã có cookie _oauth2_proxy từ app khác (*.x.vnshop.cloud) sẽ bypass
    # /vnpay-sso handler → không tạo LiteLLM user → stuck tại /ui/login/.
    # Các rule dưới đây đảm bảo mọi request thiếu LiteLLM session cookie (`token`)
    # đều được redirect tới /teleport-sso (nếu qua Teleport) hoặc /vnpay-sso (fallback).
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Teleport App Access: JWT header + root path → /teleport-sso
      if ($http_teleport_jwt_assertion) { set $do_teleport 1; }
      if ($request_uri = /)             { set $do_teleport "${do_teleport}1"; }
      if ($do_teleport = "11")          { return 302 /teleport-sso; }

      # UI handoff: user vào /ui/* mà chưa có cookie 'token' (LiteLLM session).
      # Cookie được set bởi /vnpay-sso | /teleport-sso handler sau khi tạo user.
      # Teleport-first (nếu có JWT), fallback oauth2-proxy /vnpay-sso.
      if ($http_teleport_jwt_assertion) { set $handoff_target /teleport-sso; }
      if ($handoff_target = "")         { set $handoff_target /vnpay-sso; }
      if ($cookie_token = "")           { set $do_handoff 1; }
      if ($uri ~ ^/ui(/.*)?$)           { set $do_handoff "${do_handoff}1"; }
      if ($do_handoff = "11")           { return 302 $handoff_target; }
  hosts:
    - host: litellm.x.vnshop.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tls-vnshop-cloud
      hosts:
        - litellm.x.vnshop.cloud

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 4000

# ─── Migration Job ────────────────────────────────────────────────────────────
migrationJob:
  enabled: true
  hooks:
    argocd:
      enabled: false
    helm:
      enabled: true

# ─── High Availability ────────────────────────────────────────────────────────
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

pdb:
  enabled: true
  minAvailable: 1

# ─── Pod Scheduling ───────────────────────────────────────────────────────────
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: litellm

# ─── Routing Hook — mount Python pre-call hook vào container ──────────────────
# ConfigMap được tạo bởi helm chart: helm/litellm-routing-hook/
# Apply trước helm upgrade: helm upgrade --install litellm-routing-hook helm/litellm-routing-hook -n litellm
volumes:
  - name: routing-hook
    configMap:
      name: litellm-routing-hook
  # Hotpatch: force temperature=1 cho moonshot reasoning models (kimi-k2.5)
  # ConfigMap: kubectl create configmap litellm-moonshot-patch --from-file=transformation.py=... -n litellm
  - name: moonshot-patch
    configMap:
      name: litellm-moonshot-patch

volumeMounts:
  - name: routing-hook
    mountPath: /etc/litellm/hooks
    readOnly: true
  # custom_sso: get_instance_fn resolves relative to config dir /etc/litellm/
  # nên cần mount file thẳng vào /etc/litellm/vnpay_sso_handler.py
  - name: routing-hook
    mountPath: /etc/litellm/vnpay_sso_handler.py
    subPath: vnpay_sso_handler.py
    readOnly: true
  - name: moonshot-patch
    mountPath: /app/litellm/llms/moonshot/chat/transformation.py
    subPath: transformation.py
    readOnly: true
  - name: moonshot-patch
    mountPath: /usr/lib/python3.13/site-packages/litellm/llms/moonshot/chat/transformation.py
    subPath: transformation.py
    readOnly: true

# ─── Probe tuning — LiteLLM startup ~60-90s (load DB models + init callbacks) ───
livenessProbe:
  initialDelaySeconds: 60 # cho đủ thời gian startup trước khi bắt đầu check
  periodSeconds: 30 # giảm từ 10s → probe ít aggressive hơn
  timeoutSeconds: 30 # tăng từ 10s → tránh false-positive khi CPU throttle
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15 # giảm tần suất check khi pod busy
  timeoutSeconds: 15 # tăng từ 5s → 15s tránh false-positive khi CPU throttle
  failureThreshold: 3

startupProbe:
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30 # 30 × 10s = 5 phút max startup window

# ─── Extra env vars ───────────────────────────────────────────────────────────
# Format: list [{name, value}] — upstream chart dùng toYaml trực tiếp vào container env
extraEnvVars:
  - name: LITELLM_LOG
    value: "INFO" # DEBUG → INFO: giảm CPU/IO đáng kể khi production
  - name: PYTHONPATH
    value: "/etc/litellm/hooks"
  - name: OTEL_EXPORTER
    value: "otlp_grpc"
  - name: OTEL_ENDPOINT
    value: "http://jaeger.sdlc-go-prod.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "litellm-gateway"
  - name: LITELLM_USE_CHAT_COMPLETIONS_URL_FOR_ANTHROPIC_MESSAGES
    value: "true" # Force chat/completions path cho openai provider — fix vnpay/minimax on-premise
