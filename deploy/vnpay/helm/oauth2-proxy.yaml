---
# oauth2-proxy — Google SSO cho LiteLLM UI (không cần enterprise)
# Pattern: Nginx Ingress auth_request → oauth2-proxy → Google OAuth2
# API calls (Bearer token) bypass oauth2-proxy qua auth-snippet
#
# Deploy: kubectl apply -f helm/oauth2-proxy.yaml -n litellm
# Secret:  kubectl create secret generic litellm-oauth2-proxy-secret -n litellm \
#            --from-literal=GOOGLE_CLIENT_ID=<id> \
#            --from-literal=GOOGLE_CLIENT_SECRET=<secret> \
#            --from-literal=OAUTH2_PROXY_COOKIE_SECRET=<base64-32bytes>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-oauth2-proxy
  namespace: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-oauth2-proxy
  template:
    metadata:
      labels:
        app: litellm-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=google
            - --email-domain=vnpay.vn          # Restrict to @vnpay.vn only
            - --upstream=file:///dev/null       # oauth2-proxy chỉ làm auth, upstream do nginx handle
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://litellm.x.vnshop.cloud/oauth2/callback
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-name=_litellm_oauth2
            - --cookie-expire=8h                # Session 8h làm việc
            - --set-xauthrequest=true           # Forward X-Auth-Request-Email/User headers
            - --pass-access-token=false
            - --skip-provider-button=false
            - --reverse-proxy=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: litellm-oauth2-proxy-secret
                  key: GOOGLE_CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: litellm-oauth2-proxy-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: litellm-oauth2-proxy-secret
                  key: OAUTH2_PROXY_COOKIE_SECRET
          ports:
            - containerPort: 4180
          resources:
            requests:
              cpu: "50m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-oauth2-proxy
  namespace: litellm
spec:
  selector:
    app: litellm-oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
