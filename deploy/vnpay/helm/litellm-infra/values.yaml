# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Infrastructure — Default Values
# ═══════════════════════════════════════════════════════════════════════════════

global:
  namespace: litellm

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  image: postgres:16-alpine
  database: litellm
  storage: 15Gi
  storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"

# ─── PgBouncer (connection pooling for PostgreSQL) ───────────────────────────
pgbouncer:
  enabled: true
  image: edoburu/pgbouncer:latest
  replicas: 1
  poolMode: session               # session mode — required for Prisma advisory locks (migrate deploy)
  maxClientConn: "200"            # max client connections (LiteLLM pods × Prisma pool)
  defaultPoolSize: "20"           # server connections per pool
  minPoolSize: "5"                # keep warm connections
  reservePoolSize: "5"            # extra connections for burst
  reservePoolTimeout: "3"         # seconds before using reserve pool
  serverIdleTimeout: "600"        # close idle server connections after 10min
  serverLifetime: "3600"          # recycle server connections every 1h
  serverConnectTimeout: "15"      # timeout connecting to PostgreSQL
  queryWaitTimeout: "120"         # max wait for available server connection
  authType: scram-sha-256
  resources:
    requests:
      memory: 32Mi
      cpu: 100m
    limits:
      memory: 64Mi
      cpu: 250m

# ─── PostgreSQL read-only user (dùng cho GoClaw ops agent analytics) ─────────
readOnlyUser:
  enabled: true
  username: litellm_ro
  # Password Secret được tạo out-of-band (không render vào chart):
  #   kubectl create secret generic litellm-ro-credentials \
  #     --from-literal=password=<RO_PASSWORD> \
  #     --from-literal=dsn=postgresql://litellm_ro:<RO_PASSWORD>@litellm-postgresql:5432/litellm?sslmode=disable \
  #     -n litellm
  passwordSecret:
    name: litellm-ro-credentials
    key: password

# ─── Redis ────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7-alpine
  maxMemory: 128mb
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 192Mi
      cpu: 250m

# ─── Public Ingress (API qua WAF/CDN, không cần Teleport auth) ───────────────
publicIngress:
  enabled: true
  host: api-llm.x.vnshop.cloud
  uiHost: litellm.x.vnshop.cloud   # /ui redirect target
  # Bật IP allowlist ở tầng nginx. Mặc định tắt vì WAF VNPayCloud đã filter trước,
  # và bật allowlist khi WAF forward XFF sẽ block public IP của client (false positive).
  enforceAllowlist: false
  # VNPayCloud WAF/CDN IP allowlist
  allowedIPs:
    # LB health check (public subnet)
    - 10.10.1.0/24
    # K8s pod CIDR (internal access)
    - 10.244.0.0/16
    # K8s private subnet (pods via LB internal)
    - 10.10.10.0/24
    # K8s SNAT IP (pods → Floating IP → LB loopback)
    - 103.161.38.38
    # WAF HCM
    - 103.161.38.94
    - 103.161.38.95
    - 103.161.38.2
    - 103.161.38.3
    - 103.161.38.111
    - 103.161.38.112
    # WAF HNI
    - 103.161.39.7
    - 103.161.39.8
    - 103.67.185.133
    - 103.67.185.134
    - 103.161.39.66
    - 103.161.39.67
    # WAF DC Viettel
    - 116.111.180.101
    - 116.111.180.102
