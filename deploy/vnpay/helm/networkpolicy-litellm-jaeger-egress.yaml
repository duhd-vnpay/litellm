---
# Allow LiteLLM (namespace: litellm) to push OTLP traces to Jaeger (namespace: sdlc-go-prod)
# Applied as Ingress policy on Jaeger side — does not restrict litellm egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-litellm-otlp
  namespace: sdlc-go-prod
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litellm
          podSelector:
            matchLabels:
              app.kubernetes.io/name: litellm
      ports:
        - protocol: TCP
          port: 4317
